name: rawi
description: "Rawi — Witness history. Carry the story. The complete Seerah as a game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  just_audio: ^0.9.40
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.jpg"
  adaptive_icon_background: "#0B1E2D"
  adaptive_icon_foreground: "assets/icon/app_icon.jpg"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/audio/vo/
    - assets/audio/companion/
    - assets/audio/ambient/
    - assets/video/
    - assets/scenes/
    - assets/figures/
    - assets/icon/
